<!DOCTYPE html>
<html>
<head>
  <title>Digital Evidence Dashboard</title>
  <link rel="stylesheet" href="style.css">

  <script src="js/auth.js"></script>
  <script src="js/dashboard.js"></script>
</head>

<body>

<h1>Digital Evidence Dashboard</h1>

<button onclick="logout()">Logout</button>

<!-- ROLE -->
<div class="card">
  <h3>User Role: <span id="roleName"></span></h3>
</div>

<!-- NAV -->
<div class="card">
  <button onclick="goToCases()">Cases</button>
  <button onclick="goToProfile()">Profile</button>
</div>

<!-- ADMIN -->
<div class="card" id="adminPanel" style="display:none">
  <h2>Admin Panel</h2>
  <button onclick="location.href='admin.html'">Users</button>
  <button onclick="location.href='logs.html'">Logs</button>
</div>

<!-- UPLOAD -->
<div class="card" id="uploadSection">
  <h2>Upload Evidence</h2>

  <input id="title" placeholder="Title"><br><br>
  <input id="description" placeholder="Description"><br><br>

  <select id="caseSelect">
    <option value="">Select Case</option>
  </select><br><br>

  <input type="file" id="file"><br><br>

  <button onclick="uploadEvidence()">Upload</button>
</div>

<!-- SEARCH -->
<!-- SEARCH -->
<div class="card">
  <h2>Search by Case</h2>

  <input id="searchCase" placeholder="Enter Case ID">

  <button onclick="searchByCase()">Search</button>
  <button onclick="loadEvidence()">All Cases</button>
</div>

<!-- LIST -->
<div class="card">
  <h2>Evidence</h2>
  <div id="evidenceList"></div>
</div>

<!-- TIMELINE -->
<div class="card">
  <h2>Timeline</h2>
  <div id="timeline"></div>
</div>

<!-- PREVIEW -->
<div id="previewModal" 
     style="display:none; background:#000000aa; position:fixed; top:0; left:0; width:100%; height:100%; overflow:auto;">

  <div style="background:#fff; margin:50px auto; padding:20px; width:60%; max-height:90vh; overflow:auto;">
    
    <button onclick="closePreview()">Close</button>

    <div id="previewContent"></div>

  </div>
</div>
</body>
</html>
