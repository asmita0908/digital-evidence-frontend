<!DOCTYPE html>
<html>
<head>
  <title>Upload Evidence</title>

  <link rel="stylesheet" href="style.css">

  <script src="js/auth.js"></script>
  <script src="js/evidence.js"></script>
</head>

<body>

<div class="card">

  <h2>Upload Evidence</h2>

  <label>Title</label>
  <input type="text" id="title">

  <label>Case ID</label>

  <label>File</label>

  <button onclick="uploadEvidence()">Upload</button>

  <br><br>

  <button onclick="window.location.href='dashboard.html'">Back</button>

</div>

</body>
</html>
