<!DOCTYPE html>
<html>
<head>
  <title>Login - Evidence System</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">
  <h2>Login</h2>

  <label>Email</label>
  <input type="email" id="email" placeholder="Enter your email">

  <label>Password</label>
  <input type="password" id="password" placeholder="Enter your password">

  <button onclick="loginUser()">Login</button>

  <p>
    New user? <a href="register.html">Create account</a>
  </p>

  <p><a href="#" onclick="showForgot()">Forgot Password?</a></p>

  <!-- 🔐 FORGOT BOX -->
  <div id="forgotBox" style="display:none; margin-top:15px;">

    <input type="email" id="fEmail" placeholder="Enter email"><br><br>

    <button onclick="sendOTP()">Send OTP</button>
    <button onclick="sendOTP()">Resend OTP</button>

    <p id="timerText"></p>

    <input type="text" id="otp" placeholder="Enter OTP"><br><br>
    <button onclick="verifyOTP()">Verify OTP</button>

    <input type="password" id="newPassword" placeholder="New Password"><br><br>
    <button onclick="resetPassword()">Reset Password</button>

  </div>
</div>

<script src="js/auth.js"></script>

</body>
</html>
